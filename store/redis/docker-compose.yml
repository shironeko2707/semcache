# Local Redis Stack (includes the RediSearch module) for running the semcache
# Redis backend integration tests:
#   docker compose up -d
#   REDIS_ADDR=localhost:6379 go test ./...
services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
